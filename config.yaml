# ---------------------------------------------
# Ensemble settings
# ---------------------------------------------
ensemble:
  ne: 100
  state: [log_permx]
  prior_log_permx: {var: 1.0, grid: [50, 50, 1]}


# ---------------------------------------------
# Data Assimilation settings
# ---------------------------------------------
dataassim:
  #daalg: [esmda, esmda]
  daalg: [enrml, lmenrml]
  analysis: approx
  energy: 0.99
  staticvar: [log_permx]
  obsname: date

  # Why the fuck do I still need these????
  truedataindex: [0, 1, 2, 3, 4]
  assimindex: [0, 1, 2, 3, 4]

  importstaticvar: ./PRIOR/log_prior.npz
  truedata: ./DATA/true_data.pkl
  datavar: ./DATA/true_data_var.pkl
  savefolder: 'results_enrml'

  analysisdebug:
    - pred_data 
    - state 
    - ensemble_misfit
    - data_misfit 
    - data_misfit_std
    - prev_data_misfit
    - prev_data_misfit_std

#   ESMDA options
  #mda: {tot_assim_steps: 5, inflation_param: [5, 5, 5, 5, 5]}
  iteration: {max_iter: 10, data_misfit_tol: 0.0001, step_tol: 0.000001, lambda: 1000.0 ,lambda_factor: 10}

# ---------------------------------------------
# Simulator settings
# ---------------------------------------------
fwdsim:
  parallel: 8
  runfile: MODEL.mako
  reportpoint: ./DATA/assim_dates.csv
  #reportpoint: ./TRUE_MODEL/report_dates.csv
  reporttype: dates 

  datatype:
    - WOPR:P1:P2:P3:P4
    - WGPR:P1:P2:P3:P4
    - WWPR:P1:P2:P3:P4
  
  output_format: list
    
